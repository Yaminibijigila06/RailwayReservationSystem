<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Available Trains</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Available Trains</h2>

    <table class="table table-bordered">

        <thead>

        <tr>

            <th>Train No</th>
            <th>Name</th>
            <th>Source</th>
            <th>Destination</th>
            <th>Departure</th>
            <th>Arrival</th>
            <th>Fare</th>
            <th>Seats</th>
            <th>Book</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="train : ${trains}">

            <td th:text="${train.trainNumber}"></td>
            <td th:text="${train.trainName}"></td>
            <td th:text="${train.source}"></td>
            <td th:text="${train.destination}"></td>
            <td th:text="${train.departureTime}"></td>
            <td th:text="${train.arrivalTime}"></td>
            <td th:text="${'₹' + train.fare}"></td>
            <td th:text="${train.availableSeats}"></td>

            <td>

                <a th:href="@{/user/book/{id}(id=${train.id})}"
                   class="btn btn-success">

                    Book

                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
