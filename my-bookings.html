<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>My Bookings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>My Bookings</h3>

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                <tr>

                    <th>PNR</th>
                    <th>Passenger</th>
                    <th>Train</th>
                    <th>Route</th>
                    <th>Seats</th>
                    <th>Fare</th>
                    <th>Booking Date</th>
                    <th>Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="booking : ${bookings}">

                    <td th:text="${booking.pnr}"></td>

                    <td th:text="${booking.passengerName}"></td>

                    <td th:text="${booking.train.trainName}"></td>

                    <td th:text="${booking.train.source + ' → ' + booking.train.destination}"></td>

                    <td th:text="${booking.seatsBooked}"></td>

                    <td th:text="${'₹' + (booking.train.fare * booking.seatsBooked)}"></td>

                    <td th:text="${booking.bookingDate}"></td>

                    <td>

                        <a th:href="@{/user/booking/cancel/{id}(id=${booking.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Cancel this ticket?')">

                            Cancel Ticket

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
