<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Manage Trains</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/admin.css}">

</head>

<body>

<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

<div class="main">

    <div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

    <div class="card shadow mt-4">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h4>Manage Trains</h4>

            <a th:href="@{/admin/trains/add}"
               class="btn btn-light">

                <i class="bi bi-plus-circle"></i>

                Add Train

            </a>

        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                <tr>

                    <th>No</th>

                    <th>Train No</th>

                    <th>Name</th>

                    <th>Source</th>

                    <th>Destination</th>

                    <th>Departure</th>

                    <th>Arrival</th>

                    <th>Seats</th>

                    <th>Fare</th>

                    <th>Actions</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="train, stat : ${trains}">

                    <td th:text="${stat.count}"></td>

                    <td th:text="${train.trainNumber}"></td>

                    <td th:text="${train.trainName}"></td>

                    <td th:text="${train.source}"></td>

                    <td th:text="${train.destination}"></td>

                    <td th:text="${train.departureTime}"></td>

                    <td th:text="${train.arrivalTime}"></td>

                    <td th:text="${train.availableSeats + ' / ' + train.totalSeats}"></td>

                    <td th:text="${'₹' + train.fare}"></td>

                    <td>

                        <a th:href="@{/admin/trains/edit/{id}(id=${train.id})}"
                           class="btn btn-warning btn-sm">

                            <i class="bi bi-pencil"></i>

                        </a>

                        <a th:href="@{/admin/trains/delete/{id}(id=${train.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this train?');">

                            <i class="bi bi-trash"></i>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
