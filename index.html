<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Railway Reservation System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="hero-section">

    <div class="container py-5">

        <div class="row align-items-center">

            <div class="col-lg-6">

                <h1 class="display-3 fw-bold text-primary">
                    Railway Reservation System
                </h1>

                <p class="lead mt-3">
                    Book train tickets online with ease. Search trains,
                    check seat availability, book instantly, and manage your journeys.
                </p>

                <a th:href="@{/register}"
                   class="btn btn-primary btn-lg mt-3">
                    Get Started
                </a>

            </div>

            <div class="col-lg-6 text-center">

                <img src="https://images.unsplash.com/photo-1474487548417-781cb71495f3?w=700"
                     class="img-fluid rounded shadow"
                     alt="Train"/>

            </div>

        </div>

    </div>

</section>
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
