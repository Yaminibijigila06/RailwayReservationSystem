<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/admin.css}">

</head>

<body>

<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

<div class="main">

    <div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

    <div class="row mt-4">

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <i class="bi bi-train-front display-4 text-primary"></i>

                    <h5 class="mt-3">Total Trains</h5>

                    <h2 th:text="${trainCount}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <i class="bi bi-people display-4 text-success"></i>

                    <h5 class="mt-3">Users</h5>

                    <h2 th:text="${userCount}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <i class="bi bi-ticket-perforated display-4 text-warning"></i>

                    <h5 class="mt-3">Bookings</h5>

                    <h2 th:text="${bookingCount}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <i class="bi bi-currency-rupee display-4 text-danger"></i>

                    <h5 class="mt-3">Revenue</h5>

                    <h2>₹<span th:text="${revenue}"></span></h2>


                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
