<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Train</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Add New Train</h2>

    <form th:action="@{/admin/trains/save}"
          th:object="${train}"
          method="post">

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Train Number</label>
                <input class="form-control"
                       th:field="*{trainNumber}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Train Name</label>
                <input class="form-control"
                       th:field="*{trainName}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Source</label>
                <input class="form-control"
                       th:field="*{source}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Destination</label>
                <input class="form-control"
                       th:field="*{destination}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Departure Time</label>
                <input type="time"
                       class="form-control"
                       th:field="*{departureTime}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Arrival Time</label>
                <input type="time"
                       class="form-control"
                       th:field="*{arrivalTime}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Total Seats</label>
                <input type="number"
                       class="form-control"
                       th:field="*{totalSeats}">
            </div>

            <div class="col-md-6 mb-3">
                <label>Fare</label>
                <input type="number"
                       step="0.01"
                       class="form-control"
                       th:field="*{fare}">
            </div>

        </div>

        <button class="btn btn-primary">
            Save Train
        </button>

    </form>

</div>

</body>
</html>
