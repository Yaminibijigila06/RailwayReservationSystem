<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>

                <i class="bi bi-person-circle"></i>

                My Profile

            </h3>

        </div>

        <div class="card-body">

            <form th:action="@{/user/profile/update}"
                  th:object="${user}"
                  method="post">

                <input type="hidden"
                       th:field="*{id}">

                <input type="hidden"
                       th:field="*{password}">

                <input type="hidden"
                       th:field="*{role}">

                <input type="hidden"
                       th:field="*{enabled}">

                <input type="hidden"
                       th:field="*{createdAt}">

                <div class="mb-3">

                    <label>Name</label>

                    <input class="form-control"
                           th:field="*{name}">

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input class="form-control"
                           th:field="*{email}"
                           readonly>

                </div>

                <div class="mb-3">

                    <label>Phone</label>

                    <input class="form-control"
                           th:field="*{phone}">

                </div>

                <button class="btn btn-success">

                    Update Profile

                </button>

                <a th:href="@{/user/dashboard}"
                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
