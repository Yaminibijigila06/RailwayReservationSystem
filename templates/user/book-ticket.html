<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Book Ticket</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>Book Ticket</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/user/book}" th:object="${booking}" method="post">

                <input type="hidden"
                       th:field="*{trainId}">

                <div class="mb-3">

                    <label>Passenger Name</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{passengerName}"
                           required>

                </div>

                <div class="mb-3">

                    <label>Age</label>

                    <input type="number"
                           class="form-control"
                           th:field="*{passengerAge}"
                           required>

                </div>

                <div class="mb-3">

                    <label>Gender</label>

                    <select class="form-control"
                            th:field="*{gender}">

                        <option value="Male">Male</option>

                        <option value="Female">Female</option>

                        <option value="Other">Other</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label>Seats</label>

                    <input type="number"
                           class="form-control"
                           th:field="*{seatsBooked}"
                           min="1"
                           required>

                </div>

                <button class="btn btn-success">

                    Confirm Booking

                </button>

                <a th:href="@{/user/search}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
