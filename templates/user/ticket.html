<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>E-Ticket</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h2>E - Railway Ticket</h2>

        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <tr>

                    <th>PNR</th>

                    <td th:text="${booking.pnr}"></td>

                </tr>

                <tr>

                    <th>Passenger</th>

                    <td th:text="${booking.passengerName}"></td>

                </tr>

                <tr>

                    <th>Age</th>

                    <td th:text="${booking.passengerAge}"></td>

                </tr>

                <tr>

                    <th>Gender</th>

                    <td th:text="${booking.gender}"></td>

                </tr>

                <tr>

                    <th>Train</th>

                    <td th:text="${booking.train.trainName}"></td>

                </tr>

                <tr>

                    <th>Train No</th>

                    <td th:text="${booking.train.trainNumber}"></td>

                </tr>

                <tr>

                    <th>Source</th>

                    <td th:text="${booking.train.source}"></td>

                </tr>

                <tr>

                    <th>Destination</th>

                    <td th:text="${booking.train.destination}"></td>

                </tr>

                <tr>

                    <th>Departure</th>

                    <td th:text="${booking.train.departureTime}"></td>

                </tr>

                <tr>

                    <th>Arrival</th>

                    <td th:text="${booking.train.arrivalTime}"></td>

                </tr>

                <tr>

                    <th>Seats</th>

                    <td th:text="${booking.seatsBooked}"></td>

                </tr>

                <tr>

                    <th>Payment</th>

                    <td class="text-success"
                        th:text="${booking.paymentStatus}"></td>

                </tr>

                <tr>

                    <th>Booking Date</th>

                    <td th:text="${booking.bookingDate}"></td>

                </tr>

            </table>

            <a th:href="@{'/user/ticket/download/'+${booking.id}}"
               class="btn btn-success">

                Download Ticket

            </a>

            <a th:href="@{/user/bookings}"
               class="btn btn-secondary">

                Back

            </a>

        </div>

    </div>

</div>

</body>

</html>
