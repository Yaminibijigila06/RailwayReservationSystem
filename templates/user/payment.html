<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Payment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header bg-success text-white">

                    <h3>
                        <i class="bi bi-credit-card"></i>
                        Railway Ticket Payment
                    </h3>

                </div>

                <div class="card-body">

                    <h5 class="mb-4">Booking Details</h5>

                    <table class="table table-bordered">

                        <tr>
                            <th>Train Name</th>
                            <td th:text="${booking.train.trainName}"></td>
                        </tr>

                        <tr>
                            <th>Train Number</th>
                            <td th:text="${booking.train.trainNumber}"></td>
                        </tr>

                        <tr>
                            <th>Passenger</th>
                            <td th:text="${booking.passengerName}"></td>
                        </tr>

                        <tr>
                            <th>Seats</th>
                            <td th:text="${booking.seatsBooked}"></td>
                        </tr>

                        <tr>
                            <th>Fare Per Seat</th>
                            <td>
                                ₹<span th:text="${booking.train.fare}"></span>
                            </td>
                        </tr>

                        <tr>
                            <th>Total Amount</th>
                            <td class="text-success fw-bold">
                                ₹<span th:text="${booking.train.fare * booking.seatsBooked}"></span>
                            </td>
                        </tr>

                    </table>

                    <form th:action="@{/user/payment/success}" method="post">

                        <input type="hidden"
                               name="bookingId"
                               th:value="${booking.id}">

                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-credit-card"></i>
                            Pay Now
                        </button>

                    </form>

                    <a th:href="@{/user/bookings}"
                       class="btn btn-secondary w-100 mt-3">
                        Cancel Payment
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
