<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <h3>Edit Train</h3>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>Add New Train</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/admin/trains/update}"
                  th:object="${train}"
                  method="post"> <input type="hidden" th:field="*{id}">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Train Number</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{trainNumber}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Train Name</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{trainName}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Source</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{source}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Destination</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{destination}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Departure Time</label>

                        <input type="time"
                               class="form-control"
                               name="departureTime"
                               th:value="${#temporals.format(train.departureTime,'HH:mm')}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Arrival Time</label>

                        <input type="time"
                               class="form-control"
                               name="arrivalTime"
                               th:value="${#temporals.format(train.arrivalTime,'HH:mm')}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Total Seats</label>
                        <input type="number"
                               class="form-control"
                               th:field="*{totalSeats}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Fare</label>
                        <input type="number"
                               step="0.01"
                               class="form-control"
                               th:field="*{fare}">
                    </div>

                </div>

                <button class="btn btn-success">
                    <i class="bi bi-check-circle"></i>
                    Update Train
                </button>

                <a th:href="@{/admin/trains}"
                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
