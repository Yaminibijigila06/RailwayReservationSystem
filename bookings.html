<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Manage Bookings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/admin.css}">

</head>

<body>

<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

<div class="main">

    <div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

    <div class="card shadow mt-4">

        <div class="card-header bg-primary text-white">

            <h3>All Bookings</h3>

        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <thead class="table-dark">

                <tr>

                    <th>PNR</th>

                    <th>Passenger</th>

                    <th>Train</th>

                    <th>Seats</th>

                    <th>Fare</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="booking : ${bookings}">

                    <td th:text="${booking.pnr}"></td>

                    <td th:text="${booking.passengerName}"></td>

                    <td th:text="${booking.train.trainName}"></td>

                    <td th:text="${booking.seatsBooked}"></td>

                    <td th:text="${booking.train.fare * booking.seatsBooked}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
